<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OT Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --border: #2a2d35;
    --border-light: #353840;
    --primary: #4f8ef7;
    --primary-dim: #1a2d52;
    --green: #3ecf8e;
    --green-dim: #0f3626;
    --amber: #f5a623;
    --amber-dim: #3d2a07;
    --red: #f76b6b;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--primary-dim);
    border: 1px solid var(--primary);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Control Bar ── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 110px;
  }
  .field input:focus, .field select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }
  .field select option { background: var(--surface2); }

  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.12); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-amber  { background: var(--amber);   color: #000; }
  .btn-green  { background: var(--green);   color: #000; }
  .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border-light); }

  /* ── Table ── */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .table-scroll { overflow-y: auto; max-height: 460px; }
  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--surface); }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead { position: sticky; top: 0; z-index: 10; }
  thead th {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr.weekend { background: rgba(79,142,247,0.04); }
  tbody tr.weekend:hover { background: rgba(79,142,247,0.07); }
  tbody tr.on-leave { background: rgba(245,166,35,0.05); }

  td {
    padding: 8px 14px;
    vertical-align: middle;
  }
  .td-day { font-weight: 500; color: var(--text); }
  .td-date { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .td-weekend .td-day { color: var(--primary); }

  .td-ot {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 15px;
    color: var(--text-dim);
  }
  .td-ot.has-ot { color: var(--green); }

  .td-amt {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    color: var(--text-dim);
  }
  .td-amt.has-amt { color: var(--amber); }

  td input[type="text"] {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 5px 8px;
    width: 82px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  td input[type="text"]:hover {
    border-color: var(--border-light);
    background: var(--surface2);
  }
  td input[type="text"]:focus {
    border-color: var(--primary);
    background: var(--surface2);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }
  td input[type="text"].invalid {
    border-color: var(--red) !important;
    background: rgba(247,107,107,0.08);
  }

  /* Checkbox toggle */
  .toggle { position: relative; display: inline-block; width: 34px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border-light);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider { background: var(--amber-dim); border: 1px solid var(--amber); }
  .toggle input:checked + .slider::before { transform: translateX(14px); background: var(--amber); }

  /* ── Footer ── */
  .footer {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .totals-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .totals-item { display: flex; flex-direction: column; gap: 3px; }
  .totals-item .tl { font-size: 11px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-muted); font-family: var(--mono); }
  .totals-item .tv { font-family: var(--mono); font-weight: 600; }
  .tv-ot  { font-size: 20px; color: var(--green); }
  .tv-amt { font-size: 22px; color: var(--amber); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13.5px;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(12px);
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 640px) {
    body { padding: 14px; }
    .controls { gap: 14px; }
  }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<div class="header">
  <div class="header-icon">⏱</div>
  <div>
    <h1>Overtime Calculator</h1>
    <p>Generate monthly OT sheet · Calculate · Export</p>
  </div>
</div>

<!-- ─── Controls ─── -->
<div class="controls">
  <div class="field">
    <label>Month</label>
    <select id="monthSel"></select>
  </div>
  <div class="field">
    <label>Year</label>
    <input type="text" id="yearInp" value="" style="width:90px"/>
  </div>
  <div class="field">
    <label>OT Rate (per hr)</label>
    <input type="text" id="rateInp" value="500" style="width:110px"/>
  </div>
  <button class="btn btn-primary" onclick="generateSheet()">Generate Sheet</button>
</div>

<!-- ─── Table ─── -->
<div class="table-wrapper">
  <div class="table-scroll">
    <table id="otTable">
      <thead>
        <tr>
          <th>Day</th>
          <th>Date</th>
          <th>Duty In</th>
          <th>Duty Out</th>
          <th>OT</th>
          <th>Amount</th>
          <th>Leave</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="empty-state"><div class="icon">📅</div><p>Select a month and click <strong>Generate Sheet</strong> to begin</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ─── Footer ─── -->
<div class="footer">
  <div class="actions">
    <button class="btn btn-amber" onclick="calculateAll()">Calculate Totals</button>
    <button class="btn btn-green" onclick="exportCSV()">Export CSV</button>
  </div>
  <div class="totals-card">
    <div class="totals-item">
      <span class="tl">Total OT</span>
      <span class="tv tv-ot" id="totalOT">—</span>
    </div>
    <div class="totals-item">
      <span class="tl">Total Amount</span>
      <span class="tv tv-amt" id="totalAmt">—</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// =============================================
//  CONFIGURATION  (mirrors ot_logic.py)
// =============================================
const MORNING_OT_LIMIT = { h: 7, m: 30 };   // 07:30
const NORMAL_DUTY_TIME  = { h: 8, m: 30 };   // 08:30
const MORNING_REDUCE_MIN = 8 * 60;            // 480
const NORMAL_REDUCE_MIN  = 7 * 60 + 45;       // 465
const MIN_OT_MIN         = 60;

// =============================================
//  HELPERS
// =============================================
function toMins(t) { return t.h * 60 + t.m; }
function cmp(a, b) { return toMins(a) - toMins(b); }   // negative = a before b

function roundDown15(m) { return Math.floor(m / 15) * 15; }

function parseTime(s) {
  if (!s || !s.trim()) return null;
  const clean = s.trim().replace('.', ':');
  const parts = clean.split(':');
  if (parts.length !== 2) return null;
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) return null;
  return { h, m };
}

function formatOT(minutes) {
  if (!minutes) return '—';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (m === 15) return `${h}¼`;
  if (m === 30) return `${h}½`;
  if (m === 45) return `${h}¾`;
  return `${h}`;
}

function formatAmt(amt) {
  if (!amt) return '—';
  return amt.toLocaleString('en-LK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// =============================================
//  OT CALCULATION  (mirrors ot_logic.py exactly)
// =============================================
function calculateOT(dutyIn, dutyOut, dayType) {
  if (!dutyIn || !dutyOut) return 0;

  let inMins  = toMins(dutyIn);
  let outMins = toMins(dutyOut);

  // Overnight handling
  if (outMins <= inMins) outMins += 24 * 60;
  const totalRaw = outMins - inMins;

  // ── WEEKEND / LEAVE ──
  if (dayType === 'weekend') {
    return roundDown15(totalRaw);
  }

  // ── WEEKDAY ──

  // MORNING OT (in < 07:30)
  if (cmp(dutyIn, MORNING_OT_LIMIT) < 0) {
    const total = roundDown15(totalRaw);
    return Math.max(0, total - MORNING_REDUCE_MIN);
  }

  // NORMAL START (07:30 ≤ in ≤ 08:30)
  if (cmp(dutyIn, MORNING_OT_LIMIT) >= 0 && cmp(dutyIn, NORMAL_DUTY_TIME) <= 0) {
    const forcedInMins = toMins(NORMAL_DUTY_TIME);
    let worked = outMins - forcedInMins;
    if (worked <= 0) return 0;
    worked = roundDown15(worked);
    const ot = worked - NORMAL_REDUCE_MIN;
    return ot < MIN_OT_MIN ? 0 : ot;
  }

  // LATE COME (in > 08:30)
  const total = roundDown15(totalRaw);
  const ot = total - NORMAL_REDUCE_MIN;
  return ot < MIN_OT_MIN ? 0 : ot;
}

// =============================================
//  CALENDAR UTILS
// =============================================
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getMonthDates(year, month) {   // month: 1-based
  const days = new Date(year, month, 0).getDate();
  const dates = [];
  for (let d = 1; d <= days; d++) {
    const dt = new Date(year, month - 1, d);
    dates.push({ date: dt, dayName: DAYS[dt.getDay()] });
  }
  return dates;
}

function isWeekend(dayName) { return dayName === 'Saturday' || dayName === 'Sunday'; }

function fmtDate(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// =============================================
//  INIT MONTH / YEAR SELECTS
// =============================================
(function init() {
  const now = new Date();
  const sel = document.getElementById('monthSel');
  MONTHS.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = name;
    if (i + 1 === now.getMonth() + 1) opt.selected = true;
    sel.appendChild(opt);
  });
  document.getElementById('yearInp').value = now.getFullYear();
})();

// =============================================
//  GENERATE SHEET
// =============================================
let rows = [];   // [{dutyIn, dutyOut, otCell, amtCell, leaveChk, dateStr, dayName}]

function generateSheet() {
  const month  = parseInt(document.getElementById('monthSel').value);
  const year   = parseInt(document.getElementById('yearInp').value);
  if (isNaN(year) || year < 2000 || year > 2100) { showToast('⚠ Invalid year'); return; }

  const dates = getMonthDates(year, month);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows = [];

  dates.forEach((d, idx) => {
    const weekend = isWeekend(d.dayName);
    const tr = document.createElement('tr');
    if (weekend) tr.classList.add('weekend');

    // Day
    const tdDay = document.createElement('td');
    tdDay.className = 'td-day';
    tdDay.textContent = d.dayName;
    if (weekend) tdDay.style.color = 'var(--primary)';
    tr.appendChild(tdDay);

    // Date
    const tdDate = document.createElement('td');
    tdDate.className = 'td-date';
    tdDate.textContent = fmtDate(d.date);
    tr.appendChild(tdDate);

    // Duty In
    const tdIn = document.createElement('td');
    const inInp = document.createElement('input');
    inInp.type = 'text'; inInp.placeholder = '08:30';
    inInp.dataset.row = idx; inInp.dataset.col = 0;
    tdIn.appendChild(inInp);
    tr.appendChild(tdIn);

    // Duty Out
    const tdOut = document.createElement('td');
    const outInp = document.createElement('input');
    outInp.type = 'text'; outInp.placeholder = '17:00';
    outInp.dataset.row = idx; outInp.dataset.col = 1;
    tdOut.appendChild(outInp);
    tr.appendChild(tdOut);

    // OT label
    const tdOT = document.createElement('td');
    tdOT.className = 'td-ot'; tdOT.textContent = '—';
    tr.appendChild(tdOT);

    // Amount label
    const tdAmt = document.createElement('td');
    tdAmt.className = 'td-amt'; tdAmt.textContent = '—';
    tr.appendChild(tdAmt);

    // Leave toggle
    const tdLeave = document.createElement('td');
    const lbl = document.createElement('label');
    lbl.className = 'toggle';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.addEventListener('change', () => {
      tr.classList.toggle('on-leave', chk.checked);
    });
    const sldr = document.createElement('span');
    sldr.className = 'slider';
    lbl.appendChild(chk); lbl.appendChild(sldr);
    tdLeave.appendChild(lbl);
    tr.appendChild(tdLeave);

    tbody.appendChild(tr);

    // Keyboard nav
    bindNav(inInp);  bindNav(outInp);

    rows.push({ inInp, outInp, tdOT, tdAmt, leaveChk: chk, dayName: d.dayName, dateStr: fmtDate(d.date) });
  });

  if (rows.length) rows[0].inInp.focus();
  showToast(`✓ Generated ${dates.length} days for ${MONTHS[month-1]} ${year}`);
}

// =============================================
//  KEYBOARD NAV
// =============================================
function bindNav(inp) {
  inp.addEventListener('keydown', e => {
    const r = parseInt(inp.dataset.row);
    const c = parseInt(inp.dataset.col);
    if (e.key === 'Enter' || e.key === 'ArrowRight') { e.preventDefault(); moveFocus(r, c === 0 ? 1 : 0, c === 0 ? 0 : 1); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); moveFocus(r, c === 1 ? 0 : 1, c === 1 ? 0 : -1); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(r + 1, c); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); moveFocus(r - 1, c); }
  });
}

function moveFocus(row, col, rowDelta = 0) {
  row += rowDelta;
  if (row < 0 || row >= rows.length) return;
  col = Math.max(0, Math.min(1, col));
  const target = col === 0 ? rows[row].inInp : rows[row].outInp;
  target.focus(); target.select();
}

// =============================================
//  CALCULATE ALL
// =============================================
function calculateAll() {
  if (!rows.length) { showToast('⚠ Generate a sheet first'); return; }

  const rate = parseFloat(document.getElementById('rateInp').value);
  if (isNaN(rate) || rate <= 0) { showToast('⚠ Invalid rate'); return; }

  let totalMin = 0, totalAmt = 0;
  let anyError = false;

  rows.forEach(row => {
    const inVal  = row.inInp.value.trim();
    const outVal = row.outInp.value.trim();

    row.inInp.classList.remove('invalid');
    row.outInp.classList.remove('invalid');

    if (!inVal && !outVal) {
      row.tdOT.textContent  = '—'; row.tdOT.className  = 'td-ot';
      row.tdAmt.textContent = '—'; row.tdAmt.className = 'td-amt';
      return;
    }

    const dutyIn  = parseTime(inVal);
    const dutyOut = parseTime(outVal);

    if (inVal && !dutyIn)  { row.inInp.classList.add('invalid');  anyError = true; }
    if (outVal && !dutyOut) { row.outInp.classList.add('invalid'); anyError = true; }

    if (!dutyIn || !dutyOut) {
      row.tdOT.textContent  = '—'; row.tdOT.className  = 'td-ot';
      row.tdAmt.textContent = '—'; row.tdAmt.className = 'td-amt';
      return;
    }

    const dayType = isWeekend(row.dayName) || row.leaveChk.checked ? 'weekend' : 'weekday';
    const otMin   = calculateOT(dutyIn, dutyOut, dayType);
    const amt     = Math.round((otMin / 60) * rate * 100) / 100;

    row.tdOT.textContent  = formatOT(otMin);
    row.tdOT.className    = `td-ot${otMin ? ' has-ot' : ''}`;
    row.tdAmt.textContent = amt ? formatAmt(amt) : '—';
    row.tdAmt.className   = `td-amt${amt ? ' has-amt' : ''}`;

    totalMin += otMin;
    totalAmt += amt;
  });

  document.getElementById('totalOT').textContent  = formatOT(totalMin) || '0';
  document.getElementById('totalAmt').textContent = totalAmt ? formatAmt(totalAmt) : '0.00';

  if (anyError) showToast('⚠ Some times are invalid — check red fields');
  else showToast(`✓ Calculation complete`);
}

// =============================================
//  EXPORT CSV
// =============================================
function exportCSV() {
  if (!rows.length) { showToast('⚠ Nothing to export'); return; }

  const month = document.getElementById('monthSel');
  const year  = document.getElementById('yearInp').value;
  const rate  = document.getElementById('rateInp').value;

  let csv = `OT Calculator Export\nMonth: ${month.options[month.selectedIndex].text} ${year}\nRate: ${rate}\n\n`;
  csv += 'Day,Date,Duty In,Duty Out,OT,Amount,Leave\n';

  rows.forEach(row => {
    const ot  = row.tdOT.textContent  === '—' ? '' : row.tdOT.textContent;
    const amt = row.tdAmt.textContent === '—' ? '' : row.tdAmt.textContent;
    csv += `${row.dayName},${row.dateStr},${row.inInp.value},${row.outInp.value},${ot},${amt},${row.leaveChk.checked ? 'Yes' : ''}\n`;
  });

  const tot  = document.getElementById('totalOT').textContent;
  const tamt = document.getElementById('totalAmt').textContent;
  csv += `\nTOTALS,,,,${tot},${tamt},\n`;

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `OT_${year}_${String(month.value).padStart(2,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ CSV downloaded');
}

// =============================================
//  TOAST
// =============================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
